name: Download Linphone Wheel

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: List snapshots
        run: |
          curl -s "https://download.linphone.org/snapshots/linphone-python/" 
          echo "---"
          curl -s "https://download.linphone.org/snapshots/" | grep -i "python\|whl"
